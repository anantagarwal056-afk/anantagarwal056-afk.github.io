<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>IMG → PDF</title>

  <link rel="manifest" href="manifest.json"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="IMG→PDF"/>
  <meta name="theme-color" content="#f5f0eb"/>
  <link rel="apple-touch-icon" sizes="180x180" href="icon-192.png"/>
  <link rel="apple-touch-icon" sizes="152x152" href="icon-192.png"/>
  <link rel="apple-touch-icon" sizes="120x120" href="icon-192.png"/>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    :root {
      --bg: #f0f4ff;
      --surface: #ffffff;
      --surface2: #e8edf8;
      --border: #d4daf0;
      --accent: #4f46e5;
      --accent-light: #ede9fe;
      --accent-hover: #4338ca;
      --danger: #ef4444;
      --text: #1a1a2e;
      --text2: #5a5a7a;
      --text3: #9898b8;
      --shadow: 0 1px 3px rgba(79,70,229,0.08), 0 1px 2px rgba(79,70,229,0.04);
      --shadow-md: 0 4px 12px rgba(79,70,229,0.12), 0 2px 4px rgba(79,70,229,0.06);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      min-height: -webkit-fill-available;
      padding: max(32px, env(safe-area-inset-top)) max(20px, env(safe-area-inset-right)) max(100px, env(safe-area-inset-bottom)) max(20px, env(safe-area-inset-left));
      -webkit-overflow-scrolling: touch;
    }

    .container { max-width: 680px; margin: 0 auto; }

    /* Header */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }

    .logo { display: flex; align-items: center; gap: 10px; }

    .logo-icon {
      width: 42px; height: 42px;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      box-shadow: 0 4px 12px rgba(79,70,229,0.35);
    }

    .logo-text { font-size: 21px; font-weight: 800; letter-spacing: -0.03em; }
    .logo-text span { color: var(--accent); }

    .badge {
      background: var(--accent-light);
      color: var(--accent);
      font-size: 11px; font-weight: 600;
      padding: 5px 11px; border-radius: 20px;
    }

    /* Drop Zone */
    #dropzone {
      background: var(--surface);
      border: 2px dashed var(--border);
      border-radius: 20px;
      padding: 44px 24px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: var(--shadow);
      position: relative; overflow: hidden;
    }

    #dropzone:hover { border-color: var(--accent); box-shadow: var(--shadow-md); }
    #dropzone.drag-over { border-color: var(--accent); background: #f5f3ff; transform: scale(1.01); }

    #dropzone.drag-over::after {
      content: 'Drop to add!';
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; font-weight: 700; color: var(--accent);
      background: rgba(79,70,229,0.07);
    }

    .drop-icon-wrap {
      width: 68px; height: 68px;
      background: linear-gradient(135deg, var(--accent-light), #ddd6fe);
      border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 16px;
      font-size: 32px;
    }

    .drop-title { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
    .drop-sub { font-size: 13px; color: var(--text3); line-height: 1.6; }

    .drop-btn {
      display: inline-block; margin-top: 20px;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: white; font-size: 14px; font-weight: 600;
      padding: 11px 28px; border-radius: 12px; cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 14px rgba(79,70,229,0.35);
    }

    .drop-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(79,70,229,0.4); }
    #fileInput { display: none; }

    /* Options */
    .options-bar { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; }

    .opt-group {
      display: flex; align-items: center; gap: 8px;
      background: var(--surface); border: 1px solid var(--border);
      padding: 10px 14px; border-radius: 12px;
      box-shadow: var(--shadow); flex: 1; min-width: 140px;
    }

    .opt-group label { font-size: 12px; font-weight: 600; color: var(--text2); white-space: nowrap; }

    .opt-group select {
      background: transparent; border: none;
      color: var(--text); font-family: 'Inter', sans-serif;
      font-size: 13px; font-weight: 600; cursor: pointer; outline: none; flex: 1;
    }

    /* Preview */
    #preview-section { margin-top: 24px; display: none; }

    .section-header {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px;
    }

    .section-title { font-size: 14px; font-weight: 700; display: flex; align-items: center; gap: 8px; }

    .count-badge {
      background: var(--accent); color: white;
      font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 20px;
    }

    .section-hint { font-size: 12px; color: var(--text3); }

    #image-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; }

    .thumb-card {
      background: var(--surface); border: 2px solid var(--border);
      border-radius: 14px; overflow: hidden;
      position: relative; aspect-ratio: 1; cursor: grab;
      transition: all 0.15s; box-shadow: var(--shadow);
    }

    .thumb-card:hover { border-color: var(--accent); transform: scale(1.04); box-shadow: var(--shadow-md); }
    .thumb-card.drag-source { opacity: 0.35; }
    .thumb-card.drag-target { border-color: var(--accent); background: var(--accent-light); }

    .thumb-card img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .thumb-remove {
      position: absolute; top: 5px; right: 5px;
      background: var(--danger); color: white;
      border: none; border-radius: 7px;
      width: 22px; height: 22px; font-size: 14px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity 0.15s;
      box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }

    .thumb-card:hover .thumb-remove { opacity: 1; }

    .thumb-num {
      position: absolute; bottom: 5px; left: 5px;
      background: rgba(0,0,0,0.5); color: white;
      font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 5px;
    }

    /* Convert Button */
    #convert-btn {
      margin-top: 20px; width: 100%; padding: 18px;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: white; border: none;
      font-family: 'Inter', sans-serif; font-size: 16px; font-weight: 700;
      cursor: pointer; border-radius: 16px;
      transition: transform 0.15s, box-shadow 0.15s;
      display: none;
      box-shadow: 0 4px 16px rgba(79,70,229,0.38);
    }

    #convert-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(79,70,229,0.45); }
    #convert-btn:active { transform: translateY(0); }
    #convert-btn:disabled { background: var(--surface2); color: var(--text3); cursor: not-allowed; transform: none; box-shadow: none; }

    /* Progress */
    #progress-wrap {
      margin-top: 14px; background: var(--surface);
      border: 1px solid var(--border); border-radius: 14px;
      padding: 16px; display: none; box-shadow: var(--shadow);
    }

    .progress-bar-track { height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; }

    .progress-bar-fill {
      height: 100%; background: linear-gradient(90deg, #4f46e5, #7c3aed);
      width: 0%; transition: width 0.3s; border-radius: 3px;
    }

    .progress-label { font-size: 12px; font-weight: 500; color: var(--text2); margin-top: 10px; }

    /* Toast */
    #toast {
      position: fixed;
      bottom: max(32px, env(safe-area-inset-bottom));
      left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--text); color: white;
      font-size: 14px; font-weight: 600; padding: 13px 26px;
      border-radius: 14px; opacity: 0;
      transition: opacity 0.25s, transform 0.25s;
      pointer-events: none; white-space: nowrap; z-index: 100;
      box-shadow: var(--shadow-md);
    }

    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* iOS Banner */
    #ios-banner {
      display: none; position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--surface); border-top: 1px solid var(--border);
      padding: 16px max(16px, env(safe-area-inset-right)) max(24px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
      z-index: 200; align-items: center; gap: 12px;
      box-shadow: 0 -4px 20px rgba(79,70,229,0.1);
    }

    .banner-icon {
      width: 44px; height: 44px; background: var(--accent-light);
      border-radius: 12px; display: flex; align-items: center; justify-content: center;
      font-size: 22px; flex-shrink: 0;
    }

    .banner-text { flex: 1; }
    .banner-title { font-size: 14px; font-weight: 700; }
    .banner-sub { font-size: 12px; color: var(--text2); margin-top: 2px; line-height: 1.4; }
    .banner-sub strong { color: var(--accent); }

    .banner-close {
      background: var(--surface2); border: none; color: var(--text2);
      font-size: 16px; width: 30px; height: 30px; border-radius: 8px;
      cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
  </style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo">
      <div class="logo-icon">🖼️</div>
      <div class="logo-text">IMG<span>→</span>PDF</div>
    </div>
    <span class="badge">Free · Private</span>
  </header>

  <div id="dropzone" onclick="document.getElementById('fileInput').click()">
    <div class="drop-icon-wrap">📂</div>
    <p class="drop-title">Select your images</p>
    <p class="drop-sub">JPG · PNG · WEBP · GIF supported<br/>Pick multiple at once — no limit</p>
    <span class="drop-btn">Browse Photos</span>
  </div>
  <input type="file" id="fileInput" accept="image/*" multiple />

  <div class="options-bar">
    <div class="opt-group">
      <label>Page</label>
      <select id="pageSize">
        <option value="a4">A4</option>
        <option value="letter">Letter</option>
        <option value="fit">Fit to Image</option>
      </select>
    </div>
    <div class="opt-group">
      <label>Orientation</label>
      <select id="orientation">
        <option value="auto">Auto</option>
        <option value="portrait">Portrait</option>
      </select>
    </div>
    <input type="hidden" id="margin" value="0"/>
  </div>

  <div id="preview-section">
    <div class="section-header">
      <span class="section-title">Images <span class="count-badge" id="img-count">0</span></span>
      <span class="section-hint">Drag to reorder · tap × to remove</span>
    </div>
    <div id="image-grid"></div>
  </div>

  <button id="convert-btn">⚡ Convert to PDF</button>

  <div id="progress-wrap">
    <div class="progress-bar-track">
      <div class="progress-bar-fill" id="progress-fill"></div>
    </div>
    <p class="progress-label" id="progress-label">Processing…</p>
  </div>

</div>

<div id="ios-banner">
  <div class="banner-icon">📲</div>
  <div class="banner-text">
    <div class="banner-title">Install as App</div>
    <div class="banner-sub">Tap <strong>Share ↑</strong> then <strong>Add to Home Screen</strong></div>
  </div>
  <button class="banner-close" id="banner-close">×</button>
</div>

<div id="toast"></div>

<script>
  const { jsPDF } = window.jspdf;
  let images = [], dragSrcIdx = null;

  const dropzone   = document.getElementById('dropzone');
  const fileInput  = document.getElementById('fileInput');
  const grid       = document.getElementById('image-grid');
  const previewSec = document.getElementById('preview-section');
  const convertBtn = document.getElementById('convert-btn');
  const progWrap   = document.getElementById('progress-wrap');
  const progFill   = document.getElementById('progress-fill');
  const progLabel  = document.getElementById('progress-label');
  const imgCount   = document.getElementById('img-count');
  const toast      = document.getElementById('toast');

  dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('drag-over'); });
  dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag-over'));
  dropzone.addEventListener('drop', e => { e.preventDefault(); dropzone.classList.remove('drag-over'); handleFiles([...e.dataTransfer.files]); });
  fileInput.addEventListener('change', () => handleFiles([...fileInput.files]));

  function handleFiles(files) {
    files.filter(f => f.type.startsWith('image/')).forEach(file => {
      const r = new FileReader();
      r.onload = e => { images.push({ dataUrl: e.target.result, name: file.name }); renderGrid(); };
      r.readAsDataURL(file);
    });
  }

  function renderGrid() {
    grid.innerHTML = '';
    imgCount.textContent = images.length;
    previewSec.style.display = images.length ? 'block' : 'none';
    convertBtn.style.display = images.length ? 'block' : 'none';

    images.forEach((img, i) => {
      const card = document.createElement('div');
      card.className = 'thumb-card'; card.draggable = true;

      const el = document.createElement('img');
      el.src = img.dataUrl; el.alt = img.name;

      const num = document.createElement('span');
      num.className = 'thumb-num'; num.textContent = i + 1;

      const rm = document.createElement('button');
      rm.className = 'thumb-remove'; rm.textContent = '×';
      rm.onclick = e => { e.stopPropagation(); images.splice(i, 1); renderGrid(); };

      card.append(el, num, rm);

      card.addEventListener('dragstart', () => { dragSrcIdx = i; card.classList.add('drag-source'); });
      card.addEventListener('dragend',   () => { card.classList.remove('drag-source'); document.querySelectorAll('.thumb-card').forEach(c => c.classList.remove('drag-target')); });
      card.addEventListener('dragover',  e => { e.preventDefault(); card.classList.add('drag-target'); });
      card.addEventListener('dragleave', () => card.classList.remove('drag-target'));
      card.addEventListener('drop', e => {
        e.preventDefault();
        if (dragSrcIdx === null || dragSrcIdx === i) return;
        images.splice(i, 0, images.splice(dragSrcIdx, 1)[0]);
        renderGrid();
      });

      grid.appendChild(card);
    });
  }

  convertBtn.addEventListener('click', async () => {
    if (!images.length) return;
    convertBtn.disabled = true;
    progWrap.style.display = 'block';

    const pageSize   = document.getElementById('pageSize').value;
    const orientation = document.getElementById('orientation').value;

    try {
      for (let i = 0; i < images.length; i++) {
        progFill.style.width = Math.round((i / images.length) * 90) + '%';
        progLabel.textContent = `Processing image ${i + 1} of ${images.length}…`;
        await new Promise(r => setTimeout(r, 10));

        const imgEl = new Image();
        imgEl.src = images[i].dataUrl;
        await new Promise(r => { imgEl.onload = r; });

        const iw = imgEl.naturalWidth, ih = imgEl.naturalHeight;
        let ori = orientation === 'auto' ? (iw >= ih ? 'landscape' : 'portrait') : orientation;

        let pw, ph;
        if (pageSize === 'a4')    { pw = 210;   ph = 297;   }
        else if (pageSize === 'letter') { pw = 215.9; ph = 279.4; }
        else { const ratio = 25.4 / 96; pw = iw * ratio; ph = ih * ratio; }

        if (ori === 'landscape' && pageSize !== 'fit') [pw, ph] = [ph, pw];

        if (i === 0) {
          window._pdf = new jsPDF({ orientation: ori, unit: 'mm', format: pageSize === 'fit' ? [pw, ph] : pageSize });
        } else {
          window._pdf.addPage(pageSize === 'fit' ? [pw, ph] : pageSize, ori);
        }

        const ir = iw / ih, br = pw / ph;
        let dw, dh;
        if (ir > br) { dw = pw; dh = pw / ir; }
        else         { dh = ph; dw = ph * ir; }

        window._pdf.addImage(images[i].dataUrl, 'JPEG', (pw - dw) / 2, (ph - dh) / 2, dw, dh);
      }

      progFill.style.width = '100%';
      progLabel.textContent = 'Almost done…';
      await new Promise(r => setTimeout(r, 200));
      window._pdf.save('converted.pdf');
      showToast('✅ PDF Downloaded!');
    } catch (err) {
      showToast('❌ Error: ' + err.message);
    } finally {
      convertBtn.disabled = false;
      progWrap.style.display = 'none';
      progFill.style.width = '0%';
    }
  });

  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3000);
  }

  // Service Worker — auto-detects GitHub Pages subpath
  if ('serviceWorker' in navigator) {
    const base = location.pathname.replace(/\/[^/]*$/, '/') || '/';
    navigator.serviceWorker.register(base + 'sw.js', { scope: base })
      .catch(err => console.warn('SW:', err));
  }

  // iOS install banner
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  if (isIOS && !navigator.standalone && !sessionStorage.getItem('banner-dismissed')) {
    document.getElementById('ios-banner').style.display = 'flex';
  }
  document.getElementById('banner-close').addEventListener('click', () => {
    document.getElementById('ios-banner').style.display = 'none';
    sessionStorage.setItem('banner-dismissed', '1');
  });
</script>
</body>
</html>
